<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CECAPE - Cadastro</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
  body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .container { background: #fff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 100%; max-width: 640px; padding: 30px; }
  h1 { color: #1e3c72; text-align: center; margin-bottom: 8px; font-size: 24px; }
  h2 { color: #2a5298; margin-bottom: 20px; font-size: 18px; text-align: center; }
  .page { display: none; }
  .page.active { display: block; }
  label { display: block; font-weight: 600; color: #333; margin: 12px 0 6px; font-size: 14px; }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; transition: border-color .2s; }
  input:focus, select:focus { outline: none; border-color: #2a5298; }
  input[readonly] { background: #f0f0f0; color: #666; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 140px; }
  .radio-group { display: flex; gap: 20px; margin: 10px 0; }
  .radio-group label { display: flex; align-items: center; gap: 6px; margin: 0; font-weight: 500; cursor: pointer; }
  button { background: #2a5298; color: #fff; border: none; padding: 12px 24px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background .2s; }
  button:hover { background: #1e3c72; }
  button.secondary { background: #6c757d; margin-left: 10px; }
  button.secondary:hover { background: #5a6268; }
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
  #loginBtn { display: block; margin: 20px auto 0; }
  .info-box { background: #e7f1ff; border-left: 4px solid #2a5298; padding: 12px; border-radius: 4px; margin: 15px 0; font-size: 13px; color: #333; }
  .found-box { background: #d4edda; border-left: 4px solid #28a745; padding: 12px; border-radius: 4px; margin: 15px 0; font-size: 13px; }
  .error-box { background: #f8d7da; border-left: 4px solid #dc3545; padding: 12px; border-radius: 4px; margin: 15px 0; font-size: 13px; display: none; }
  .user-info { text-align: right; font-size: 12px; color: #666; margin-bottom: 10px; }
  .logout-link { color: #dc3545; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>CECAPE</h1>
  <h2>Sistema de Cadastro</h2>

  <!-- PÁGINA LOGIN -->
  <div id="pageLogin" class="page active">
    <div class="info-box">Faça login com sua conta Google (@scseduca.com.br) para acessar o sistema.</div>
    <div id="loginBtn"><div id="googleBtn" style="display:flex;justify-content:center;"></div></div>
  </div>

  <!-- PÁGINA 1 - VERIFICAÇÃO -->
  <div id="pageVerificacao" class="page">
    <div class="user-info">
      Logado: <span id="userEmail"></span> | <span class="logout-link" onclick="logout()">Sair</span>
    </div>
    <h2>Página 1 - Verificação de Duplicatas</h2>
    <div class="error-box" id="errorMsg"></div>

    <label>Verificar por:</label>
    <div class="radio-group">
      <label><input type="radio" name="tipoVerificacao" value="email" checked onchange="toggleVerificacao()"> E-mail</label>
      <label><input type="radio" name="tipoVerificacao" value="matricula" onchange="toggleVerificacao()"> Matrícula</label>
    </div>

    <div id="campoEmail">
      <label for="verifEmail">E-mail</label>
      <input type="text" id="verifEmail" placeholder="seuemail@scseduca.com.br">
    </div>
    <div id="campoMatricula" style="display:none;">
      <label for="verifMatricula">Matrícula</label>
      <input type="text" id="verifMatricula" placeholder="12345 ou 12345-6" maxlength="10">
    </div>

    <button onclick="verificarRegistro()">Verificar</button>
  </div>

  <!-- PÁGINA 2 - FORMULÁRIO -->
  <div id="pageFormulario" class="page">
    <div class="user-info">
      Logado: <span id="userEmail2"></span> | <span class="logout-link" onclick="logout()">Sair</span>
    </div>
    <h2 id="formTitulo">Novo Cadastro</h2>
    <div class="found-box" id="foundInfo" style="display:none;"></div>

    <label for="fNome">Nome</label>
    <input type="text" id="fNome">

    <div class="row">
      <div>
        <label for="fEmail">E-mail</label>
        <input type="text" id="fEmail">
      </div>
      <div>
        <label for="fMatricula">Matrícula</label>
        <input type="text" id="fMatricula">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="fTelefone">Telefone</label>
        <input type="text" id="fTelefone">
      </div>
      <div>
        <label for="fEscola">Escola</label>
        <select id="fEscola"><option value="">Carregando...</option></select>
      </div>
    </div>

    <label for="fPeriodo">Período de Trabalho</label>
    <select id="fPeriodo">
      <option value="">Selecione...</option>
      <option value="Manhã">Manhã</option>
      <option value="Tarde">Tarde</option>
      <option value="Noite">Noite</option>
      <option value="Manhã/Tarde">Manhã/Tarde</option>
      <option value="Tarde/Noite">Tarde/Noite</option>
      <option value="Integral">Integral</option>
    </select>

    <div class="row">
      <div>
        <label for="fEntrada">Horário de Entrada</label>
        <input type="time" id="fEntrada">
      </div>
      <div>
        <label for="fSaidaIntervalo">Saída (Intervalo)</label>
        <input type="time" id="fSaidaIntervalo">
      </div>
    </div>
    <div class="row">
      <div>
        <label for="fVoltaIntervalo">Entrada (Volta do Intervalo)</label>
        <input type="time" id="fVoltaIntervalo">
      </div>
      <div>
        <label for="fSaida">Saída</label>
        <input type="time" id="fSaida">
      </div>
    </div>

    <div class="btn-group">
      <button id="btnSalvar" onclick="salvarRegistro()">Criar Cadastro</button>
      <button class="secondary" id="btnVoltar" onclick="voltarVerificacao()" style="display:none;">Voltar</button>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '367248828417-n4l55p0dloon7uf71erubrmfouegq16u.apps.googleusercontent.com';
const REGISTROS_ID = '1B6xRr_WDCTkWEfsaeiEPdgDILuDwaQd1oZQEsQdF6GA';
const ESCOLAS_ID = '1VBbvfrZPQZ96e7hzpUnFG_GPfjA3I-mLKI-RgoP8OlA';
const SCOPE = 'https://www.googleapis.com/auth/spreadsheets';

let accessToken = null;
let registros = [];
let escolas = [];
let modoAtual = 'NOVO'; // NOVO ou ATUALIZACAO
let registroEncontrado = null;
let linhaEncontrada = null;
let isLoadingRegistros = false; // flag para evitar múltiplas requisições simultâneas

// ===== COLUNAS =====
const COL = {
  NOME: 'NOME',
  EMAIL: 'E-MAIL',
  MATRICULA: 'MATRÍCULA',
  TELEFONE: 'TELEFONE',
  ESCOLA: 'ESCOLA',
  PERIODO: 'PERÍODO DE TRABALHO',
  ENTRADA: 'HORÁRIO DE ENTRADA',
  SAIDA_INTERVALO: 'SAÍDA (INTERVALO)',
  VOLTA_INTERVALO: 'ENTRADA (VOLTA DO INTERVALO)',
  SAIDA: 'SAÍDA'
};

// ===== LOGIN GOOGLE =====
function initGoogle() {
  if (!window.google || !google.accounts) {
    setTimeout(initGoogle, 200);
    return;
  }
  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: onCredentialResponse
  });
  google.accounts.id.renderButton(
    document.getElementById('googleBtn'),
    { theme: 'outline', size: 'large', text: 'continue_with', shape: 'pill' }
  );
}

function onCredentialResponse(response) {
  console.log('[LOGIN] Credential recebida');
  // Usar token client para obter access token ao escopo sheets
  requestAccessToken();
}

function requestAccessToken() {
  if (!window.google || !google.accounts || !google.accounts.oauth2) {
    setTimeout(requestAccessToken, 200);
    return;
  }
  const tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: async (resp) => {
      if (resp.error) {
        console.error('[LOGIN] Erro token:', resp);
        Swal.fire('Erro', 'Falha ao obter acesso.', 'error');
        return;
      }
      accessToken = resp.access_token;
      console.log('[LOGIN] Access token obtido');
      try {
        const payload = JSON.parse(atob(resp.access_token.split('.')[1]));
        document.getElementById('userEmail').textContent = payload.email || '';
        document.getElementById('userEmail2').textContent = payload.email || '';
      } catch(e) { console.warn('[LOGIN] Não foi possível extrair email do token'); }
      await onLoginSuccess();
    }
  });
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

async function onLoginSuccess() {
  showPage('pageVerificacao');
  // Mostrar loading enquanto carrega dados
  Swal.fire({
    title: 'Carregando...',
    html: 'Aguarde enquanto os dados são carregados.',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });
  try {
    await Promise.all([carregarEscolas(), carregarRegistros()]);
  } catch (e) {
    console.error('[LOGIN] Erro ao carregar dados:', e);
  } finally {
    Swal.close();
  }
}

function logout() {
  if (accessToken && google.accounts.oauth2) {
    google.accounts.oauth2.revoke(accessToken, () => {
      console.log('[LOGOUT] Token revogado');
    });
  }
  accessToken = null;
  registros = [];
  showPage('pageLogin');
  initGoogle();
}

// ===== CARREGAR DADOS =====
async function carregarRegistros() {
  if (isLoadingRegistros) return; // evita sobreposição
  isLoadingRegistros = true;
  console.log('[DADOS] Carregando registros...');
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${REGISTROS_ID}/values/A1:J10000?access_token=${accessToken}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (!data.values || data.values.length < 1) {
      console.warn('[DADOS] Planilha vazia');
      registros = [];
      return;
    }
    const headers = data.values[0].map(h => (h || '').trim().toUpperCase());
    const rows = data.values.slice(1);
    registros = rows.map((r, idx) => {
      const obj = { _linha: idx + 2 }; // linha real na planilha (header=1)
      headers.forEach((h, i) => { obj[h] = (r[i] || '').trim(); });
      return obj;
    });
    console.log(`[DADOS] ${registros.length} registros carregados`);
    console.log('[DADOS] Headers:', headers);
  } catch (e) {
    console.error('[DADOS] Erro ao carregar registros:', e);
    Swal.fire('Erro', 'Não foi possível carregar os registros.', 'error');
    throw e;
  } finally {
    isLoadingRegistros = false;
  }
}

async function carregarEscolas() {
  console.log('[DADOS] Carregando escolas...');
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${ESCOLAS_ID}/values/A1:A500?access_token=${accessToken}`;
    const resp = await fetch(url);
    const data = await resp.json();
    const sel = document.getElementById('fEscola');
    sel.innerHTML = '<option value="">Selecione...</option>';
    if (data.values && data.values.length > 0) {
      const vals = data.values.map(r => (r[0] || '').trim()).filter(v => v);
      if (vals[0] && vals[0].toUpperCase().includes('ESCOLA')) vals.shift(); // ignora cabeçalho
      escolas = vals;
      vals.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        sel.appendChild(opt);
      });
      console.log(`[DADOS] ${vals.length} escolas carregadas`);
    }
  } catch (e) {
    console.error('[DADOS] Erro ao carregar escolas:', e);
    document.getElementById('fEscola').innerHTML = '<option value="">Erro ao carregar</option>';
    throw e;
  }
}

// ===== VERIFICAÇÃO =====
function toggleVerificacao() {
  const tipo = document.querySelector('input[name="tipoVerificacao"]:checked').value;
  document.getElementById('campoEmail').style.display = tipo === 'email' ? 'block' : 'none';
  document.getElementById('campoMatricula').style.display = tipo === 'matricula' ? 'block' : 'none';
  document.getElementById('errorMsg').style.display = 'none';
}

function showError(msg) {
  const box = document.getElementById('errorMsg');
  box.textContent = msg;
  box.style.display = 'block';
  console.warn('[VALIDAÇÃO] ' + msg);
}

function isEmailEscola(email) {
  const local = email.split('@')[0].toLowerCase();
  // Verifica prefixos com ou sem ponto, e padrão que inclui números
  const prefixos = ['eme', 'emef', 'emei', 'emi'];
  for (const p of prefixos) {
    if (local.startsWith(p + '.') || local.startsWith(p) && /^[a-z]{0,3}\./.test(local)) continue;
    if (local.startsWith(p)) return true;
  }
  if (/^(eme|emef|emei|emi)\./i.test(local)) return true;
  if (/^(eme|emef|emei|emi)\d/i.test(local)) return true;
  return false;
}

function normalizarMatricula5(mat) {
  const digits = String(mat || '').replace(/\D/g, '');
  return digits.substring(0, 5);
}

async function verificarRegistro() {
  console.log('[VERIFICAÇÃO] Botão Verificar pressionado');
  document.getElementById('errorMsg').style.display = 'none';

  // Se registros ainda não carregados, carrega com loading e depois prossegue
  if (registros.length === 0) {
    console.log('[VERIFICAÇÃO] Registros vazios, carregando...');
    Swal.fire({
      title: 'Carregando dados...',
      allowOutsideClick: false,
      didOpen: () => Swal.showLoading()
    });
    try {
      await carregarRegistros();
    } catch (e) {
      Swal.fire('Erro', 'Falha ao carregar dados. Tente novamente.', 'error');
      return;
    } finally {
      Swal.close();
    }
    // Mesmo após carregar, se ainda vazio, informar
    if (registros.length === 0) {
      Swal.fire('Aviso', 'Nenhum registro encontrado na base.', 'warning');
      return;
    }
  }

  // Chama a lógica principal de verificação
  executarVerificacao();
}

function executarVerificacao() {
  console.log('[VERIFICAÇÃO] Executando verificação...');
  const tipo = document.querySelector('input[name="tipoVerificacao"]:checked').value;

  if (tipo === 'email') {
    const email = document.getElementById('verifEmail').value.trim().toLowerCase();
    console.log('[VERIFICAÇÃO] Verificando e-mail:', email);

    if (!email) { showError('Informe um e-mail.'); return; }
    if (!email.endsWith('@scseduca.com.br')) {
      showError('O e-mail deve ser do domínio @scseduca.com.br');
      return;
    }
    if (isEmailEscola(email)) {
      showError('E-mails de escola (eme.*, emef.*, emei.*, emi.*) não são permitidos.');
      Swal.fire('Bloqueado', 'E-mails de escola não são permitidos para cadastro individual.', 'error');
      return;
    }

    const encontrado = registros.find(r => {
      const e = (r[COL.EMAIL] || '').trim().toLowerCase();
      return e === email;
    });

    if (encontrado) {
      console.log('[VERIFICAÇÃO] Registro encontrado por e-mail:', encontrado);
      registroEncontrado = encontrado;
      linhaEncontrada = encontrado._linha;
      mostrarResultadoEncontrado(encontrado);
      abrirFormularioAtualizacao(encontrado);
    } else {
      console.log('[VERIFICAÇÃO] Nenhum registro encontrado por e-mail. Modo NOVO.');
      registroEncontrado = null;
      linhaEncontrada = null;
      abrirFormularioNovo({ email: email });
    }
  } else {
    const matricula = document.getElementById('verifMatricula').value.trim();
    console.log('[VERIFICAÇÃO] Verificando matrícula:', matricula);

    if (!matricula) { showError('Informe uma matrícula.'); return; }
    const mat5 = normalizarMatricula5(matricula);
    console.log('[VERIFICAÇÃO] Matrícula normalizada (5 dígitos):', mat5);
    if (mat5.length < 5) {
      showError('Matrícula deve conter ao menos 5 dígitos.');
      return;
    }

    const encontrado = registros.find(r => {
      const m = normalizarMatricula5(r[COL.MATRICULA] || '');
      return m === mat5;
    });

    if (encontrado) {
      console.log('[VERIFICAÇÃO] Registro encontrado por matrícula:', encontrado);
      registroEncontrado = encontrado;
      linhaEncontrada = encontrado._linha;
      mostrarResultadoEncontrado(encontrado);
      abrirFormularioAtualizacao(encontrado);
    } else {
      console.log('[VERIFICAÇÃO] Nenhum registro encontrado por matrícula. Modo NOVO.');
      registroEncontrado = null;
      linhaEncontrada = null;
      abrirFormularioNovo({ matricula: matricula });
    }
  }
}

function mostrarResultadoEncontrado(r) {
  Swal.fire({
    title: 'Registro Encontrado',
    html: `<div style="text-align:left;font-size:14px;">
      <b>Nome:</b> ${r[COL.NOME] || '-'}<br>
      <b>E-mail:</b> ${r[COL.EMAIL] || '-'}<br>
      <b>Matrícula:</b> ${r[COL.MATRICULA] || '-'}<br>
      <b>Escola:</b> ${r[COL.ESCOLA] || '-'}<br>
      <b>Período:</b> ${r[COL.PERIODO] || '-'}
    </div>`,
    icon: 'info',
    confirmButtonText: 'Ir para Atualização'
  });
}

// ===== FORMULÁRIO =====
function abrirFormularioNovo(dados) {
  modoAtual = 'NOVO';
  registroEncontrado = null;
  linhaEncontrada = null;
  document.getElementById('formTitulo').textContent = 'Novo Cadastro';
  document.getElementById('foundInfo').style.display = 'none';
  document.getElementById('btnSalvar').textContent = 'Criar Cadastro';
  document.getElementById('btnVoltar').style.display = 'none';

  limparCampos();
  if (dados.email) document.getElementById('fEmail').value = dados.email;
  if (dados.matricula) document.getElementById('fMatricula').value = dados.matricula;

  document.getElementById('fEmail').readOnly = false;
  document.getElementById('fMatricula').readOnly = false;

  showPage('pageFormulario');
  console.log('[FORM] Modo NOVO aberto');
}

function abrirFormularioAtualizacao(r) {
  modoAtual = 'ATUALIZACAO';
  document.getElementById('formTitulo').textContent = 'Atualizar Cadastro Existente';
  document.getElementById('btnSalvar').textContent = 'Atualizar Cadastro';
  document.getElementById('btnVoltar').style.display = 'inline-block';

  const info = document.getElementById('foundInfo');
  info.innerHTML = `<b>Registro existente encontrado:</b><br>
    Nome: ${r[COL.NOME] || '-'} | E-mail: ${r[COL.EMAIL] || '-'} | Matrícula: ${r[COL.MATRICULA] || '-'}<br>
    <i>Os campos E-mail e Matrícula não podem ser alterados.</i>`;
  info.style.display = 'block';

  document.getElementById('fNome').value = r[COL.NOME] || '';
  document.getElementById('fEmail').value = r[COL.EMAIL] || '';
  document.getElementById('fMatricula').value = r[COL.MATRICULA] || '';
  document.getElementById('fTelefone').value = r[COL.TELEFONE] || '';
  document.getElementById('fEscola').value = r[COL.ESCOLA] || '';
  document.getElementById('fPeriodo').value = r[COL.PERIODO] || '';
  document.getElementById('fEntrada').value = r[COL.ENTRADA] || '';
  document.getElementById('fSaidaIntervalo').value = r[COL.SAIDA_INTERVALO] || '';
  document.getElementById('fVoltaIntervalo').value = r[COL.VOLTA_INTERVALO] || '';
  document.getElementById('fSaida').value = r[COL.SAIDA] || '';

  document.getElementById('fEmail').readOnly = true;
  document.getElementById('fMatricula').readOnly = true;

  showPage('pageFormulario');
  console.log('[FORM] Modo ATUALIZAÇÃO aberto - linha', linhaEncontrada);
}

function limparCampos() {
  ['fNome','fEmail','fMatricula','fTelefone','fEntrada','fSaidaIntervalo','fVoltaIntervalo','fSaida'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('fEscola').value = '';
  document.getElementById('fPeriodo').value = '';
}

function voltarVerificacao() {
  showPage('pageVerificacao');
  document.getElementById('verifEmail').value = '';
  document.getElementById('verifMatricula').value = '';
  console.log('[FORM] Voltou para verificação');
}

// ===== SALVAR =====
async function salvarRegistro() {
  console.log('[SALVAR] Iniciando - modo:', modoAtual);
  const dados = coletarDadosForm();
  if (!validarDadosForm(dados)) return;

  if (modoAtual === 'NOVO') {
    const dup = verificarDuplicataRigorosa(dados);
    if (dup) {
      console.warn('[SALVAR] Duplicata detectada no salvamento:', dup);
      Swal.fire('Duplicata Detectada', 'Já existe um registro com este e-mail ou matrícula. Abrindo modo atualização.', 'warning');
      registroEncontrado = dup;
      linhaEncontrada = dup._linha;
      abrirFormularioAtualizacao(dup);
      return;
    }

    const confirm = await Swal.fire({
      title: 'Confirmar Cadastro',
      text: 'Deseja criar este novo cadastro?',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Sim, criar',
      cancelButtonText: 'Cancelar'
    });
    if (!confirm.isConfirmed) return;

    await inserirRegistro(dados);
  } else {
    const confirm = await Swal.fire({
      title: 'Confirmar Atualização',
      text: 'Deseja atualizar este cadastro existente?',
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Sim, atualizar',
      cancelButtonText: 'Cancelar'
    });
    if (!confirm.isConfirmed) return;

    await atualizarRegistro(dados);
  }
}

function coletarDadosForm() {
  return {
    [COL.NOME]: document.getElementById('fNome').value.trim(),
    [COL.EMAIL]: document.getElementById('fEmail').value.trim(),
    [COL.MATRICULA]: document.getElementById('fMatricula').value.trim(),
    [COL.TELEFONE]: document.getElementById('fTelefone').value.trim(),
    [COL.ESCOLA]: document.getElementById('fEscola').value.trim(),
    [COL.PERIODO]: document.getElementById('fPeriodo').value.trim(),
    [COL.ENTRADA]: document.getElementById('fEntrada').value.trim(),
    [COL.SAIDA_INTERVALO]: document.getElementById('fSaidaIntervalo').value.trim(),
    [COL.VOLTA_INTERVALO]: document.getElementById('fVoltaIntervalo').value.trim(),
    [COL.SAIDA]: document.getElementById('fSaida').value.trim()
  };
}

function validarDadosForm(dados) {
  if (!dados[COL.NOME]) { Swal.fire('Atenção', 'Informe o nome.', 'warning'); return false; }
  if (!dados[COL.EMAIL]) { Swal.fire('Atenção', 'Informe o e-mail.', 'warning'); return false; }
  if (!dados[COL.EMAIL].toLowerCase().endsWith('@scseduca.com.br')) {
    Swal.fire('Atenção', 'E-mail deve ser @scseduca.com.br', 'warning'); return false;
  }
  if (isEmailEscola(dados[COL.EMAIL])) {
    Swal.fire('Bloqueado', 'E-mails de escola não são permitidos.', 'error'); return false;
  }
  if (!dados[COL.MATRICULA]) { Swal.fire('Atenção', 'Informe a matrícula.', 'warning'); return false; }
  if (normalizarMatricula5(dados[COL.MATRICULA]).length < 5) {
    Swal.fire('Atenção', 'Matrícula deve conter ao menos 5 dígitos.', 'warning'); return false;
  }
  return true;
}

function verificarDuplicataRigorosa(dados) {
  const email = dados[COL.EMAIL].toLowerCase();
  const mat5 = normalizarMatricula5(dados[COL.MATRICULA]);
  console.log('[DUPLICATA] Verificando email:', email, '| mat5:', mat5);
  return registros.find(r => {
    const e = (r[COL.EMAIL] || '').trim().toLowerCase();
    const m = normalizarMatricula5(r[COL.MATRICULA] || '');
    return (e && e === email) || (m && m === mat5);
  });
}

async function inserirRegistro(dados) {
  console.log('[SALVAR] Inserindo novo registro...');
  // Mostrar loading durante a operação
  Swal.fire({
    title: 'Salvando...',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });
  try {
    const values = [[
      dados[COL.NOME], dados[COL.EMAIL], dados[COL.MATRICULA], dados[COL.TELEFONE],
      dados[COL.ESCOLA], dados[COL.PERIODO], dados[COL.ENTRADA], dados[COL.SAIDA_INTERVALO],
      dados[COL.VOLTA_INTERVALO], dados[COL.SAIDA]
    ]];
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${REGISTROS_ID}/values/A:J:append?valueInputOption=RAW&access_token=${accessToken}`;
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values })
    });
    const result = await resp.json();
    if (result.error) throw result.error;
    console.log('[SALVAR] Registro inserido:', result);
    Swal.fire('Sucesso', 'Cadastro criado com sucesso!', 'success');
    await carregarRegistros(); // recarrega lista
    voltarVerificacao();
  } catch (e) {
    console.error('[SALVAR] Erro ao inserir:', e);
    Swal.fire('Erro', 'Falha ao criar cadastro: ' + (e.message || e), 'error');
  } finally {
    Swal.close();
  }
}

async function atualizarRegistro(dados) {
  console.log('[SALVAR] Atualizando registro linha', linhaEncontrada);
  if (!linhaEncontrada) {
    Swal.fire('Erro', 'Linha do registro não identificada.', 'error');
    return;
  }
  Swal.fire({
    title: 'Atualizando...',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });
  try {
    const values = [[
      dados[COL.NOME], dados[COL.EMAIL], dados[COL.MATRICULA], dados[COL.TELEFONE],
      dados[COL.ESCOLA], dados[COL.PERIODO], dados[COL.ENTRADA], dados[COL.SAIDA_INTERVALO],
      dados[COL.VOLTA_INTERVALO], dados[COL.SAIDA]
    ]];
    const range = `A${linhaEncontrada}:J${linhaEncontrada}`;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${REGISTROS_ID}/values/${range}?valueInputOption=RAW&access_token=${accessToken}`;
    const resp = await fetch(url, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values })
    });
    const result = await resp.json();
    if (result.error) throw result.error;
    console.log('[SALVAR] Registro atualizado:', result);
    Swal.fire('Sucesso', 'Cadastro atualizado com sucesso!', 'success');
    await carregarRegistros(); // recarrega lista
    voltarVerificacao();
  } catch (e) {
    console.error('[SALVAR] Erro ao atualizar:', e);
    Swal.fire('Erro', 'Falha ao atualizar cadastro: ' + (e.message || e), 'error');
  } finally {
    Swal.close();
  }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
