<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Cadastro</title>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- Google API Client -->
  <script src="https://apis.google.com/js/api.js"></script>

  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      padding: 18px 24px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 { font-size: 1.3rem; font-weight: 600; }

    .header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .btn {
      border: none;
      cursor: pointer;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { filter: brightness(0.92); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { filter: brightness(0.92); }
    .btn-ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.4); }
    .btn-ghost:hover { background: rgba(255,255,255,0.15); }
    .btn-secondary { background: #e2e8f0; color: var(--text); }
    .btn-secondary:hover { background: #cbd5e1; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    main {
      flex: 1;
      padding: 28px 16px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      width: 100%;
      max-width: 720px;
    }

    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 6px;
      color: var(--primary-dark);
    }
    .card .subtitle { color: var(--muted); margin-bottom: 22px; font-size: 0.92rem; }

    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #334155;
    }
    label .req { color: var(--danger); }

    input, select, textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }
    input.invalid, select.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
    }
    .hint { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }
    .error-msg { font-size: 0.78rem; color: var(--danger); margin-top: 4px; display: none; }
    .error-msg.show { display: block; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

    .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; flex-wrap: wrap; }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge-new { background: #dcfce7; color: #166534; }
    .badge-update { background: #fef3c7; color: #92400e; }

    .hidden { display: none !important; }

    /* Debug panel */
    #debugPanel {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 380px;
      max-height: 280px;
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Consolas', monospace;
      font-size: 0.78rem;
      border-top-left-radius: 10px;
      box-shadow: -4px -4px 16px rgba(0,0,0,0.3);
      z-index: 9999;
      display: flex;
      flex-direction: column;
    }
    #debugPanel .dbg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #1e293b;
      cursor: pointer;
      border-top-left-radius: 10px;
    }
    #debugPanel .dbg-header span { font-weight: 700; letter-spacing: 0.5px; }
    #debugPanel .dbg-body {
      overflow-y: auto;
      padding: 8px 12px;
      flex: 1;
    }
    #debugPanel .dbg-body .log-line { padding: 2px 0; border-bottom: 1px dashed #334155; }
    #debugPanel .log-info { color: #93c5fd; }
    #debugPanel .log-ok { color: #86efac; }
    #debugPanel .log-warn { color: #fcd34d; }
    #debugPanel .log-err { color: #fca5a5; }
    #debugPanel.collapsed .dbg-body { display: none; }
    @media (max-width: 600px) {
      #debugPanel { width: 100%; }
    }

    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #f87171; display: inline-block;
    }
    .status-dot.ok { background: #4ade80; }

    .loader {
      border: 3px solid #e2e8f0;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 18px; height: 18px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .mode-banner {
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 18px;
      font-size: 0.88rem;
      font-weight: 600;
    }
    .mode-banner.new { background: #dcfce7; color: #166534; }
    .mode-banner.update { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>

  <header>
    <h1>📋 Sistema de Cadastro</h1>
    <div class="header-actions">
      <span id="authStatus" style="font-size:0.85rem; display:flex; align-items:center; gap:6px;">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Não autenticado</span>
      </span>
      <button id="btnSignIn" class="btn btn-ghost">Entrar com Google</button>
      <button id="btnSignOut" class="btn btn-ghost hidden">Sair</button>
    </div>
  </header>

  <main>
    <!-- PÁGINA 1: Verificação -->
    <section id="pageVerify" class="card">
      <h2>Verificação de Cadastro</h2>
      <p class="subtitle">Informe seu e-mail pessoal ou matrícula para verificar se você já está cadastrado.</p>

      <div class="form-group">
        <label for="verifyInput">E-mail pessoal ou Matrícula <span class="req">*</span></label>
        <input type="text" id="verifyInput" placeholder="exemplo@gmail.com ou 123456" autocomplete="off" />
        <div class="hint">Use e-mail pessoal. E-mails institucionais de escola não são permitidos.</div>
        <div class="error-msg" id="verifyError"></div>
      </div>

      <div class="actions">
        <button id="btnVerify" class="btn btn-primary">Verificar</button>
      </div>
    </section>

    <!-- PÁGINA 2: Formulário -->
    <section id="pageForm" class="card hidden">
      <h2 id="formTitle">Formulário de Cadastro</h2>
      <p class="subtitle" id="formSubtitle">Preencha os campos abaixo.</p>

      <div id="modeBanner" class="mode-banner new">
        <span id="modeBadge" class="badge badge-new">NOVO CADASTRO</span>
      </div>

      <form id="cadForm" novalidate>
        <input type="hidden" id="fldRowIndex" value="" />

        <div class="grid-2">
          <div class="form-group">
            <label for="fldNome">Nome completo <span class="req">*</span></label>
            <input type="text" id="fldNome" required />
            <div class="error-msg" id="errNome"></div>
          </div>

          <div class="form-group">
            <label for="fldMatricula">Matrícula <span class="req">*</span></label>
            <input type="text" id="fldMatricula" required />
            <div class="error-msg" id="errMatricula"></div>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="fldEmail">E-mail pessoal <span class="req">*</span></label>
            <input type="email" id="fldEmail" required />
            <div class="error-msg" id="errEmail"></div>
          </div>

          <div class="form-group">
            <label for="fldTelefone">Telefone <span class="req">*</span></label>
            <input type="tel" id="fldTelefone" placeholder="(00) 00000-0000" required />
            <div class="error-msg" id="errTelefone"></div>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label for="fldEscola">Escola <span class="req">*</span></label>
            <select id="fldEscola" required>
              <option value="">Selecione...</option>
            </select>
            <div class="error-msg" id="errEscola"></div>
          </div>

          <div class="form-group">
            <label for="fldFuncao">Função <span class="req">*</span></label>
            <select id="fldFuncao" required>
              <option value="">Selecione...</option>
              <option value="Professor">Professor</option>
              <option value="Coordenador">Coordenador</option>
              <option value="Diretor">Diretor</option>
              <option value="Secretario">Secretário</option>
              <option value="Outro">Outro</option>
            </select>
            <div class="error-msg" id="errFuncao"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="fldObs">Observações</label>
          <textarea id="fldObs" rows="3" placeholder="Opcional"></textarea>
        </div>

        <div class="actions">
          <button type="button" id="btnBack" class="btn btn-secondary">Voltar</button>
          <button type="submit" id="btnSave" class="btn btn-success">Salvar</button>
        </div>
      </form>
    </section>
  </main>

  <!-- DEBUG PANEL -->
  <div id="debugPanel" class="collapsed">
    <div class="dbg-header" id="dbgToggle">
      <span>🛠 DEBUG</span>
      <span id="dbgCount">0</span>
    </div>
    <div class="dbg-body" id="dbgBody"></div>
  </div>

  <script type="module">
    import { CONFIG } from './CONFIG.js';
    import * as Auth from './auth.js';
    import * as Sheets from './sheetsService.js';

    /* ============================================================
       DEBUG LOGGER
    ============================================================ */
    const dbgBody = document.getElementById('dbgBody');
    const dbgCount = document.getElementById('dbgCount');
    let dbgN = 0;

    function log(msg, type = 'info') {
      dbgN++;
      const line = document.createElement('div');
      line.className = 'log-line log-' + type;
      const ts = new Date().toLocaleTimeString();
      line.textContent = `[${ts}] ${msg}`;
      dbgBody.appendChild(line);
      dbgBody.scrollTop = dbgBody.scrollHeight;
      dbgCount.textContent = dbgN;
      /* eslint-disable no-console */
      const fn = type === 'err' ? console.error : type === 'warn' ? console.warn : console.log;
      fn(`[DEBUG] ${msg}`);
    }

    document.getElementById('dbgToggle').addEventListener('click', () => {
      document.getElementById('debugPanel').classList.toggle('collapsed');
    });

    /* ============================================================
       ELEMENTS
    ============================================================ */
    const pageVerify = document.getElementById('pageVerify');
    const pageForm = document.getElementById('pageForm');
    const btnSignIn = document.getElementById('btnSignIn');
    const btnSignOut = document.getElementById('btnSignOut');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const btnVerify = document.getElementById('btnVerify');
    const verifyInput = document.getElementById('verifyInput');
    const verifyError = document.getElementById('verifyError');
    const btnBack = document.getElementById('btnBack');
    const cadForm = document.getElementById('cadForm');
    const btnSave = document.getElementById('btnSave');
    const modeBanner = document.getElementById('modeBanner');
    const modeBadge = document.getElementById('modeBadge');

    let currentMode = 'new'; // 'new' | 'update'
    let currentRecord = null;
    let escolasCache = [];

    /* ============================================================
       CONFIG VALIDATION
    ============================================================ */
    log('Inicializando aplicação...', 'info');
    log(`Client ID: ${CONFIG?.clientId || 'NÃO DEFINIDO'}`, 'info');
    log(`Planilha REGISTROS: ${CONFIG?.spreadsheets?.REGISTROS || 'NÃO DEFINIDA'}`, 'info');
    log(`Planilha ESCOLAS: ${CONFIG?.spreadsheets?.ESCOLAS || 'NÃO DEFINIDA'}`, 'info');

    if (!CONFIG?.clientId || !CONFIG?.spreadsheets?.REGISTROS || !CONFIG?.spreadsheets?.ESCOLAS) {
      Swal.fire({
        icon: 'error',
        title: 'Configuração inválida',
        text: 'Verifique CONFIG.js (clientId, spreadsheets.REGISTROS, spreadsheets.ESCOLAS).'
      });
      log('CONFIG incompleto!', 'err');
    }

    /* ============================================================
       AUTH
    ============================================================ */
    function updateAuthUI(signedIn) {
      if (signedIn) {
        statusDot.classList.add('ok');
        statusText.textContent = 'Autenticado';
        btnSignIn.classList.add('hidden');
        btnSignOut.classList.remove('hidden');
        log('Usuário autenticado.', 'ok');
      } else {
        statusDot.classList.remove('ok');
        statusText.textContent = 'Não autenticado';
        btnSignIn.classList.remove('hidden');
        btnSignOut.classList.add('hidden');
        log('Usuário não autenticado.', 'warn');
      }
    }

    btnSignIn.addEventListener('click', async () => {
      try {
        log('Iniciando autenticação...', 'info');
        await Auth.signIn();
        updateAuthUI(Auth.isSignedIn());
        await loadEscolas();
      } catch (e) {
        log('Erro ao autenticar: ' + e.message, 'err');
        Swal.fire({ icon: 'error', title: 'Falha na autenticação', text: e.message });
      }
    });

    btnSignOut.addEventListener('click', async () => {
      try {
        await Auth.signOut();
        updateAuthUI(false);
      } catch (e) {
        log('Erro ao sair: ' + e.message, 'err');
      }
    });

    /* ============================================================
       VALIDATIONS
    ============================================================ */
    const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const MATRICULA_REGEX = /^[A-Za-z0-9]{3,20}$/;
    const PHONE_REGEX = /^\(?\d{2}\)?\s?9?\d{4,5}-?\d{4}$/;

    // Domínios de e-mail de escola bloqueados
    const BLOCKED_DOMAINS = [
      'escola.gov.br',
      'educacao.gov.br',
      'seed.pr.gov.br',
      'escolas.pr.gov.br',
      'pm.pr.gov.br',
      '.gov.br'
    ];

    function isSchoolEmail(email) {
      if (!email) return false;
      const domain = email.split('@')[1]?.toLowerCase() || '';
      return BLOCKED_DOMAINS.some(d => domain.endsWith(d));
    }

    function showError(fieldId, msgId, message) {
      const field = document.getElementById(fieldId);
      const errEl = document.getElementById(msgId);
      if (field) field.classList.add('invalid');
      if (errEl) {
        errEl.textContent = message;
        errEl.classList.add('show');
      }
    }

    function clearError(fieldId, msgId) {
      const field = document.getElementById(fieldId);
      const errEl = document.getElementById(msgId);
      if (field) field.classList.remove('invalid');
      if (errEl) {
        errEl.textContent = '';
        errEl.classList.remove('show');
      }
    }

    function clearAllErrors() {
      ['errNome','errMatricula','errEmail','errTelefone','errEscola','errFuncao'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.textContent = ''; el.classList.remove('show'); }
      });
      ['fldNome','fldMatricula','fldEmail','fldTelefone','fldEscola','fldFuncao'].forEach(id => {
        document.getElementById(id)?.classList.remove('invalid');
      });
    }

    function validateForm() {
      clearAllErrors();
      let valid = true;

      const nome = document.getElementById('fldNome').value.trim();
      const matricula = document.getElementById('fldMatricula').value.trim();
      const email = document.getElementById('fldEmail').value.trim();
      const telefone = document.getElementById('fldTelefone').value.trim();
      const escola = document.getElementById('fldEscola').value;
      const funcao = document.getElementById('fldFuncao').value;

      if (nome.length < 3) {
        showError('fldNome', 'errNome', 'Informe o nome completo (mínimo 3 caracteres).');
        valid = false;
      }

      if (!MATRICULA_REGEX.test(matricula)) {
        showError('fldMatricula', 'errMatricula', 'Matrícula inválida (3 a 20 caracteres alfanuméricos).');
        valid = false;
      }

      if (!EMAIL_REGEX.test(email)) {
        showError('fldEmail', 'errEmail', 'E-mail inválido.');
        valid = false;
      } else if (isSchoolEmail(email)) {
        showError('fldEmail', 'errEmail', 'E-mails institucionais de escola não são permitidos. Use e-mail pessoal.');
        valid = false;
      }

      if (!PHONE_REGEX.test(telefone)) {
        showError('fldTelefone', 'errTelefone', 'Telefone inválido. Ex: (41) 99999-9999');
        valid = false;
      }

      if (!escola) {
        showError('fldEscola', 'errEscola', 'Selecione a escola.');
        valid = false;
      }

      if (!funcao) {
        showError('fldFuncao', 'errFuncao', 'Selecione a função.');
        valid = false;
      }

      return valid;
    }

    /* ============================================================
       ESCOLAS (dropdown)
    ============================================================ */
    async function loadEscolas() {
      try {
        log('Carregando lista de escolas...', 'info');
        const rows = await Sheets.getRows(CONFIG.spreadsheets.ESCOLAS, 'ESCOLAS');
        escolasCache = rows || [];
        const select = document.getElementById('fldEscola');
        select.innerHTML = '<option value="">Selecione...</option>';
        escolasCache.forEach(r => {
          const nome = r.nome || r.NOME || r[0] || '';
          if (nome) {
            const opt = document.createElement('option');
            opt.value = nome;
            opt.textContent = nome;
            select.appendChild(opt);
          }
        });
        log(`${escolasCache.length} escolas carregadas.`, 'ok');
      } catch (e) {
        log('Erro ao carregar escolas: ' + e.message, 'err');
        Swal.fire({ icon: 'warning', title: 'Aviso', text: 'Não foi possível carregar a lista de escolas.' });
      }
    }

    /* ============================================================
       NAVIGATION
    ============================================================ */
    function showPage(page) {
      if (page === 'verify') {
        pageVerify.classList.remove('hidden');
        pageForm.classList.add('hidden');
      } else {
        pageVerify.classList.add('hidden');
        pageForm.classList.remove('hidden');
      }
    }

    btnBack.addEventListener('click', () => {
      showPage('verify');
      cadForm.reset();
      clearAllErrors();
      currentRecord = null;
    });

    /* ============================================================
       VERIFICAÇÃO (Página 1)
    ============================================================ */
    btnVerify.addEventListener('click', async () => {
      verifyError.classList.remove('show');
      const value = verifyInput.value.trim();

      if (!value) {
        verifyError.textContent = 'Informe e-mail ou matrícula.';
        verifyError.classList.add('show');
        return;
      }

      const isEmailInput = value.includes('@');
      if (isEmailInput) {
        if (!EMAIL_REGEX.test(value)) {
          verifyError.textContent = 'E-mail inválido.';
          verifyError.classList.add('show');
          return;
        }
        if (isSchoolEmail(value)) {
          verifyError.textContent = 'E-mails de escola não são permitidos. Use e-mail pessoal.';
          verifyError.classList.add('show');
          Swal.fire({
            icon: 'warning',
            title: 'E-mail bloqueado',
            text: 'Utilize seu e-mail pessoal. E-mails institucionais de escola não são aceitos.'
          });
          return;
        }
      } else {
        if (!MATRICULA_REGEX.test(value)) {
          verifyError.textContent = 'Matrícula inválida.';
          verifyError.classList.add('show');
          return;
        }
      }

      if (!Auth.isSignedIn()) {
        Swal.fire({
          icon: 'info',
          title: 'Autenticação necessária',
          text: 'Faça login com o Google para continuar.'
        });
        return;
      }

      try {
        btnVerify.disabled = true;
        btnVerify.innerHTML = '<span class="loader"></span> Verificando...';
        log(`Verificando: ${value}`, 'info');

        const rows = await Sheets.getRows(CONFIG.spreadsheets.REGISTROS, 'REGISTROS');
        const found = (rows || []).find(r => {
          const email = (r.email || r.EMAIL || r[2] || '').toString().toLowerCase();
          const mat = (r.matricula || r.MATRICULA || r[1] || '').toString().toLowerCase();
          return email === value.toLowerCase() || mat === value.toLowerCase();
        });

        if (found) {
          log('Registro encontrado. Modo: ATUALIZAÇÃO', 'ok');
          currentMode = 'update';
          currentRecord = found;
          await openForm('update', found);
        } else {
          log('Registro não encontrado. Modo: NOVO', 'warn');
          currentMode = 'new';
          currentRecord = null;
          await openForm('new', null, value);
        }
      } catch (e) {
        log('Erro na verificação: ' + e.message, 'err');
        Swal.fire({ icon: 'error', title: 'Erro', text: 'Falha ao consultar registros: ' + e.message });
      } finally {
        btnVerify.disabled = false;
        btnVerify.textContent = 'Verificar';
      }
    });

    /* ============================================================
       FORM (Página 2)
    ============================================================ */
    async function openForm(mode, record, prefillValue = '') {
      clearAllErrors();
      cadForm.reset();

      if (mode === 'update') {
        document.getElementById('formTitle').textContent = 'Atualizar Cadastro';
        document.getElementById('formSubtitle').textContent = 'Atualize os dados abaixo.';
        modeBanner.className = 'mode-banner update';
        modeBadge.className = 'badge badge-update';
        modeBadge.textContent = 'ATUALIZAÇÃO';

        document.getElementById('fldRowIndex').value = record.__row || record.rowIndex || '';
        document.getElementById('fldNome').value = record.nome || record.NOME || record[0] || '';
        document.getElementById('fldMatricula').value = record.matricula || record.MATRICULA || record[1] || '';
        document.getElementById('fldEmail').value = record.email || record.EMAIL || record[2] || '';
        document.getElementById('fldTelefone').value = record.telefone || record.TELEFONE || record[3] || '';
        document.getElementById('fldEscola').value = record.escola || record.ESCOLA || record[4] || '';
        document.getElementById('fldFuncao').value = record.funcao || record.FUNCAO || record[5] || '';
        document.getElementById('fldObs').value = record.obs || record.OBS || record[6] || '';
      } else {
        document.getElementById('formTitle').textContent = 'Novo Cadastro';
        document.getElementById('formSubtitle').textContent = 'Preencha os campos abaixo.';
        modeBanner.className = 'mode-banner new';
        modeBadge.className = 'badge badge-new';
        modeBadge.textContent = 'NOVO CADASTRO';

        document.getElementById('fldRowIndex').value = '';
        if (prefillValue.includes('@')) {
          document.getElementById('fldEmail').value = prefillValue;
        } else if (prefillValue) {
          document.getElementById('fldMatricula').value = prefillValue;
        }
      }

      showPage('form');
    }

    /* ============================================================
       SALVAR
    ============================================================ */
    cadForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!validateForm()) {
        Swal.fire({ icon: 'error', title: 'Formulário inválido', text: 'Corrija os campos destacados.' });
        return;
      }

      if (!Auth.isSignedIn()) {
        Swal.fire({ icon: 'info', title: 'Autenticação necessária', text: 'Faça login para salvar.' });
        return;
      }

      const payload = {
        nome: document.getElementById('fldNome').value.trim(),
        matricula: document.getElementById('fldMatricula').value.trim(),
        email: document.getElementById('fldEmail').value.trim(),
        telefone: document.getElementById('fldTelefone').value.trim(),
        escola: document.getElementById('fldEscola').value,
        funcao: document.getElementById('fldFuncao').value,
        obs: document.getElementById('fldObs').value.trim(),
        atualizadoEm: new Date().toISOString()
      };

      const confirmText = currentMode === 'update'
        ? 'Deseja realmente atualizar este cadastro?'
        : 'Deseja realmente salvar este novo cadastro?';

      const confirmRes = await Swal.fire({
        icon: 'question',
        title: 'Confirmação',
        text: confirmText,
        showCancelButton: true,
        confirmButtonText: 'Sim, salvar',
        cancelButtonText: 'Cancelar',
        confirmButtonColor: '#16a34a'
      });

      if (!confirmRes.isConfirmed) return;

      try {
        btnSave.disabled = true;
        btnSave.innerHTML = '<span class="loader"></span> Salvando...';
        log(`Salvando em modo ${currentMode}...`, 'info');

        let result;
        if (currentMode === 'update') {
          const rowIndex = document.getElementById('fldRowIndex').value;
          result = await Sheets.updateRow(CONFIG.spreadsheets.REGISTROS, 'REGISTROS', rowIndex, payload);
          log('Registro atualizado com sucesso.', 'ok');
        } else {
          result = await Sheets.appendRow(CONFIG.spreadsheets.REGISTROS, 'REGISTROS', payload);
          log('Novo registro criado com sucesso.', 'ok');
        }

        await Swal.fire({
          icon: 'success',
          title: 'Sucesso!',
          text: currentMode === 'update' ? 'Cadastro atualizado!' : 'Cadastro realizado!',
          timer: 2000,
          showConfirmButton: false
        });

        cadForm.reset();
        currentRecord = null;
        showPage('verify');
        verifyInput.value = '';
      } catch (err) {
        log('Erro ao salvar: ' + err.message, 'err');
        Swal.fire({ icon: 'error', title: 'Erro ao salvar', text: err.message });
      } finally {
        btnSave.disabled = false;
        btnSave.textContent = 'Salvar';
      }
    });

    /* ============================================================
       INIT
    ============================================================ */
    (async function init() {
      try {
        log('Inicializando Auth...', 'info');
        await Auth.initAuth(CONFIG);
        const signed = Auth.isSignedIn();
        updateAuthUI(signed);
        if (signed) {
          await loadEscolas();
        }
      } catch (e) {
        log('Falha na inicialização: ' + e.message, 'err');
      }

      // Limpar erros ao digitar
      ['fldNome','fldMatricula','fldEmail','fldTelefone','fldEscola','fldFuncao'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('input', () => {
            const errId = 'err' + id.replace('fld','');
            clearError(id, errId);
          });
        }
      });

      verifyInput.addEventListener('input', () => {
        verifyError.classList.remove('show');
        verifyError.textContent = '';
      });

      log('Aplicação pronta.', 'ok');
    })();
  </script>
</body>
</html>
