<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CECAPE - Cadastro</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
    body { background: #f4f6f9; color: #333; padding: 20px; }
    .container { max-width: 720px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px; }
    h2 { color: #34495e; margin-bottom: 20px; font-size: 18px; }
    .page { display: none; }
    .page.active { display: block; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; color: #2c3e50; font-size: 14px; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ccd; border-radius: 8px; font-size: 14px; }
    input:focus, select:focus { outline: none; border-color: #2980b9; box-shadow: 0 0 0 3px rgba(41,128,185,0.15); }
    .btn { display: inline-block; padding: 12px 22px; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; transition: 0.2s; }
    .btn-primary { background: #2980b9; color: #fff; }
    .btn-primary:hover { background: #21618c; }
    .btn-secondary { background: #ecf0f1; color: #2c3e50; }
    .btn-secondary:hover { background: #d5dbdb; }
    .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .debug-panel { margin-top: 20px; background: #1e1e1e; color: #0f0; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 12px; max-height: 200px; overflow: auto; display: none; }
    .debug-toggle { margin-top: 20px; font-size: 12px; color: #7f8c8d; cursor: pointer; text-align: right; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge-new { background: #e8f8f5; color: #16a085; }
    .badge-update { background: #fef9e7; color: #f39c12; }
    .info-box { background: #eaf2f8; border-left: 4px solid #2980b9; padding: 12px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>CECAPE - Cadastro</h1>

    <!-- PÁGINA 1: VERIFICAÇÃO -->
    <div id="page-check" class="page active">
      <h2>Verificação de Cadastro</h2>
      <div class="info-box">
        Informe seu <strong>E-mail</strong> e <strong>Matrícula</strong> para verificar se você já possui cadastro.
      </div>
      <div class="form-group">
        <label for="check-email">E-mail *</label>
        <input type="email" id="check-email" placeholder="seuemail@exemplo.com" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="check-matricula">Matrícula *</label>
        <input type="text" id="check-matricula" placeholder="0000-0" autocomplete="off" />
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="btn-check">Verificar</button>
      </div>
    </div>

    <!-- PÁGINA 2: FORMULÁRIO -->
    <div id="page-form" class="page">
      <h2 id="form-title">Formulário de Cadastro</h2>
      <div id="mode-badge"></div>
      <div class="form-group">
        <label for="f-nome">NOME *</label>
        <input type="text" id="f-nome" />
      </div>
      <div class="form-group">
        <label for="f-email">E-MAIL *</label>
        <input type="email" id="f-email" />
      </div>
      <div class="form-group">
        <label for="f-matricula">MATRÍCULA *</label>
        <input type="text" id="f-matricula" />
      </div>
      <div class="form-group">
        <label for="f-telefone">TELEFONE *</label>
        <input type="text" id="f-telefone" />
      </div>
      <div class="form-group">
        <label for="f-escola">ESCOLA *</label>
        <select id="f-escola"><option value="">Carregando escolas...</option></select>
      </div>
      <div class="form-group">
        <label for="f-periodo">PERÍODO DE TRABALHO *</label>
        <select id="f-periodo">
          <option value="">Selecione...</option>
          <option value="Manhã">Manhã</option>
          <option value="Tarde">Tarde</option>
          <option value="Noite">Noite</option>
          <option value="Manhã e Tarde">Manhã e Tarde</option>
          <option value="Tarde e Noite">Tarde e Noite</option>
          <option value="Manhã, Tarde e Noite">Manhã, Tarde e Noite</option>
        </select>
      </div>
      <div class="form-group">
        <label for="f-entrada">HORÁRIO DE ENTRADA *</label>
        <input type="time" id="f-entrada" />
      </div>
      <div class="form-group">
        <label for="f-saida-intervalo">SAÍDA (INTERVALO) *</label>
        <input type="time" id="f-saida-intervalo" />
      </div>
      <div class="form-group">
        <label for="f-entrada-volta">ENTRADA (VOLTA DO INTERVALO) *</label>
        <input type="time" id="f-entrada-volta" />
      </div>
      <div class="form-group">
        <label for="f-saida">SAÍDA *</label>
        <input type="time" id="f-saida" />
      </div>
      <div class="actions">
        <button class="btn btn-secondary" id="btn-back">Voltar</button>
        <button class="btn btn-primary" id="btn-save">Salvar</button>
      </div>
    </div>

    <div class="debug-toggle" onclick="toggleDebug()">Mostrar/Ocultar Debug</div>
    <div id="debug-panel" class="debug-panel"></div>
  </div>

  <script>
    // ===== CONFIGURAÇÕES =====
    const CLIENT_ID = '367248828417-n4l55p0dloon7uf71erubrmfouegq16u.apps.googleusercontent.com';
    const SPREADSHEET_ID_REGISTROS = '1B6xRr_WDCTkWEfsaeiEPdgDILuDwaQd1oZQEsQdF6GA';
    const SPREADSHEET_ID_ESCOLAS = '1VBbvfrZPQZ96e7hzpUnFG_GPfjA3I-mLKI-RgoP8OlA';
    const SCOPE = 'https://www.googleapis.com/auth/spreadsheets';
    const DISCOVERY_DOCS = ['https://sheets.googleapis.com/$discovery/rest?version=v4'];

    // Nomes EXATOS das colunas (primeira linha da planilha)
    const COL = {
      NOME: 'NOME',
      EMAIL: 'E-MAIL',
      MATRICULA: 'MATRÍCULA',
      TELEFONE: 'TELEFONE',
      ESCOLA: 'ESCOLA',
      PERIODO: 'PERÍODO DE TRABALHO',
      ENTRADA: 'HORÁRIO DE ENTRADA',
      SAIDA_INTERVALO: 'SAÍDA (INTERVALO)',
      ENTRADA_VOLTA: 'ENTRADA (VOLTA DO INTERVALO)',
      SAIDA: 'SAÍDA'
    };

    const COL_LIST = [
      COL.NOME, COL.EMAIL, COL.MATRICULA, COL.TELEFONE, COL.ESCOLA,
      COL.PERIODO, COL.ENTRADA, COL.SAIDA_INTERVALO, COL.ENTRADA_VOLTA, COL.SAIDA
    ];

    // ===== ESTADO GLOBAL =====
    let existingRecords = [];
    let escolasList = [];
    let currentMode = 'new'; // 'new' | 'update'
    let currentRecord = null;
    let tokenClient = null;
    let gisLoaded = false;
    let gapiReady = false;

    // ===== DEBUG =====
    function debugLog(msg, data) {
      const panel = document.getElementById('debug-panel');
      const time = new Date().toLocaleTimeString();
      let line = '[' + time + '] ' + msg;
      if (data !== undefined) {
        try { line += ' :: ' + JSON.stringify(data); } catch (e) { line += ' :: [objeto]'; }
      }
      panel.innerHTML += line + '\n';
      panel.scrollTop = panel.scrollHeight;
      console.log('[CECAPE]', msg, data);
    }

    function toggleDebug() {
      const panel = document.getElementById('debug-panel');
      panel.style.display = (panel.style.display === 'none' || !panel.style.display) ? 'block' : 'none';
    }

    // ===== HELPERS =====
    function normalizeEmail(email) {
      return (email || '').toString().trim().toLowerCase();
    }

    function normalizeMatricula(mat) {
      return (mat || '').toString().trim().replace(/[-\s]/g, '').toLowerCase();
    }

    function isSchoolEmail(email) {
      const dominiosEscola = ['@escola.', '@educacao.', '@gov.br', '@seed.pr.gov.br', '@escolapr'];
      const e = normalizeEmail(email);
      return dominiosEscola.some(d => e.includes(d));
    }

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function setModeBadge(mode) {
      const el = document.getElementById('mode-badge');
      if (mode === 'update') {
        el.innerHTML = '<span class="badge badge-update">Modo: Atualização</span>';
        document.getElementById('form-title').textContent = 'Atualização de Cadastro';
      } else {
        el.innerHTML = '<span class="badge badge-new">Modo: Novo Cadastro</span>';
        document.getElementById('form-title').textContent = 'Novo Cadastro';
      }
    }

    // ===== GOOGLE API =====
    function loadGoogleScripts() {
      // GAPI
      const gapiScript = document.createElement('script');
      gapiScript.src = 'https://apis.google.com/js/api.js';
      gapiScript.onload = () => {
        gapi.load('client', initGapiClient);
      };
      document.body.appendChild(gapiScript);

      // GIS
      const gisScript = document.createElement('script');
      gisScript.src = 'https://accounts.google.com/gsi/client';
      gisScript.onload = initGisClient;
      document.body.appendChild(gisScript);
    }

    async function initGapiClient() {
      try {
        await gapi.client.init({
          discoveryDocs: DISCOVERY_DOCS
        });
        gapiReady = true;
        debugLog('GAPI client inicializado');
        tryLoadInitialData();
      } catch (err) {
        debugLog('Erro init GAPI', err);
      }
    }

    function initGisClient() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPE,
        callback: ''
      });
      gisLoaded = true;
      debugLog('GIS client inicializado');
      tryLoadInitialData();
    }

    function tryLoadInitialData() {
      if (gapiReady && gisLoaded) {
        debugLog('Ambos clientes prontos. Solicitando token...');
        requestToken(() => {
          loadEscolas();
          loadExistingRecords();
        });
      }
    }

    function requestToken(callback) {
      if (!tokenClient) {
        debugLog('Token client não disponível');
        return;
      }
      tokenClient.callback = (resp) => {
        if (resp.error) {
          debugLog('Erro token', resp);
          Swal.fire('Erro', 'Falha ao autenticar com Google.', 'error');
          return;
        }
        gapi.client.setToken(resp.access_token ? resp : { access_token: resp.access_token });
        debugLog('Token obtido');
        if (callback) callback();
      };
      tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    // ===== CARREGAR ESCOLAS =====
    async function loadEscolas() {
      try {
        const range = 'A:A';
        const resp = await gapi.client.sheets.spreadsheets.values.get({
          spreadsheetId: SPREADSHEET_ID_ESCOLAS,
          range: range
        });
        const values = resp.result.values || [];
        escolasList = values.flat().map(v => (v || '').toString().trim()).filter(Boolean);
        debugLog('Escolas carregadas', escolasList.length);
        renderEscolas();
      } catch (err) {
        debugLog('Erro ao carregar escolas', err);
        Swal.fire('Aviso', 'Não foi possível carregar a lista de escolas.', 'warning');
      }
    }

    function renderEscolas() {
      const sel = document.getElementById('f-escola');
      sel.innerHTML = '<option value="">Selecione...</option>';
      escolasList.forEach(e => {
        const opt = document.createElement('option');
        opt.value = e;
        opt.textContent = e;
        sel.appendChild(opt);
      });
    }

    // ===== CARREGAR REGISTROS (nomes exatos) =====
    async function loadExistingRecords() {
      try {
        const range = 'A1:J10000';
        const resp = await gapi.client.sheets.spreadsheets.values.get({
          spreadsheetId: SPREADSHEET_ID_REGISTROS,
          range: range
        });
        const values = resp.result.values || [];
        if (values.length === 0) {
          existingRecords = [];
          debugLog('Nenhum registro encontrado');
          return;
        }

        const header = values[0].map(h => (h || '').toString().trim());
        debugLog('Cabeçalho planilha', header);

        const records = [];
        for (let i = 1; i < values.length; i++) {
          const row = values[i];
          if (!row || row.every(c => (c || '').toString().trim() === '')) continue;
          const obj = {};
          header.forEach((colName, idx) => {
            obj[colName] = (row[idx] !== undefined ? row[idx] : '').toString().trim();
          });
          obj.__rowIndex = i + 1; // linha real na planilha (1-based, +1 por header)
          records.push(obj);
        }
        existingRecords = records;
        debugLog('Registros carregados', existingRecords.length);
      } catch (err) {
        debugLog('Erro ao carregar registros', err);
        Swal.fire('Aviso', 'Não foi possível carregar os registros existentes.', 'warning');
      }
    }

    // ===== PROCURAR POR E-MAIL E MATRÍCULA (maiúsculas) =====
    function findRecordByEmailOrMatricula(email, matricula) {
      const emailNorm = normalizeEmail(email);
      const matNorm = normalizeMatricula(matricula);
      debugLog('Procurando registro', { emailNorm, matNorm });

      for (const rec of existingRecords) {
        const recEmail = normalizeEmail(rec[COL.EMAIL]);
        const recMat = normalizeMatricula(rec[COL.MATRICULA]);
        debugLog('Comparando com', { recEmail, recMat });

        if (emailNorm && recEmail === emailNorm) {
          debugLog('Match por E-MAIL', rec);
          return rec;
        }
        if (matNorm && recMat === matNorm) {
          debugLog('Match por MATRÍCULA', rec);
          return rec;
        }
      }
      debugLog('Nenhum registro encontrado');
      return null;
    }

    // ===== VERIFICAR (PÁGINA 1) =====
    document.getElementById('btn-check').addEventListener('click', async () => {
      const email = document.getElementById('check-email').value.trim();
      const matricula = document.getElementById('check-matricula').value.trim();

      if (!email || !matricula) {
        Swal.fire('Atenção', 'Preencha E-mail e Matrícula.', 'warning');
        return;
      }

      if (isSchoolEmail(email)) {
        Swal.fire('E-mail inválido', 'Não é permitido o uso de e-mail institucional de escola. Use um e-mail pessoal.', 'error');
        return;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        Swal.fire('E-mail inválido', 'Digite um e-mail válido.', 'error');
        return;
      }

      if (existingRecords.length === 0) {
        await loadExistingRecords();
      }

      const found = findRecordByEmailOrMatricula(email, matricula);

      if (found) {
        currentMode = 'update';
        currentRecord = found;
        debugLog('Registro encontrado - modo atualização', found);
        Swal.fire({
          title: 'Cadastro encontrado',
          text: 'Você será direcionado para atualizar seus dados.',
          icon: 'info',
          confirmButtonText: 'Continuar'
        }).then(() => {
          goToForm(found);
        });
      } else {
        currentMode = 'new';
        currentRecord = null;
        debugLog('Registro não encontrado - modo novo');
        Swal.fire({
          title: 'Novo cadastro',
          text: 'Nenhum registro encontrado. Você será direcionado para o formulário.',
          icon: 'success',
          confirmButtonText: 'Continuar'
        }).then(() => {
          goToForm(null, email, matricula);
        });
      }
    });

    // ===== IR PARA FORMULÁRIO (preencher com nomes exatos) =====
    function goToForm(record, prefillEmail, prefillMatricula) {
      setModeBadge(currentMode);

      if (record) {
        // Atualização - preencher com dados existentes usando nomes exatos
        document.getElementById('f-nome').value = record[COL.NOME] || '';
        document.getElementById('f-email').value = record[COL.EMAIL] || '';
        document.getElementById('f-matricula').value = record[COL.MATRICULA] || '';
        document.getElementById('f-telefone').value = record[COL.TELEFONE] || '';
        document.getElementById('f-escola').value = record[COL.ESCOLA] || '';
        document.getElementById('f-periodo').value = record[COL.PERIODO] || '';
        document.getElementById('f-entrada').value = record[COL.ENTRADA] || '';
        document.getElementById('f-saida-intervalo').value = record[COL.SAIDA_INTERVALO] || '';
        document.getElementById('f-entrada-volta').value = record[COL.ENTRADA_VOLTA] || '';
        document.getElementById('f-saida').value = record[COL.SAIDA] || '';
        debugLog('Formulário preenchido para atualização', record);
      } else {
        // Novo - limpar e pré-preencher email/matricula
        document.getElementById('f-nome').value = '';
        document.getElementById('f-email').value = prefillEmail || '';
        document.getElementById('f-matricula').value = prefillMatricula || '';
        document.getElementById('f-telefone').value = '';
        document.getElementById('f-escola').value = '';
        document.getElementById('f-periodo').value = '';
        document.getElementById('f-entrada').value = '';
        document.getElementById('f-saida-intervalo').value = '';
        document.getElementById('f-entrada-volta').value = '';
        document.getElementById('f-saida').value = '';
        debugLog('Formulário limpo para novo cadastro', { prefillEmail, prefillMatricula });
      }

      showPage('page-form');
    }

    // ===== VOLTAR =====
    document.getElementById('btn-back').addEventListener('click', () => {
      showPage('page-check');
      document.getElementById('check-email').value = '';
      document.getElementById('check-matricula').value = '';
    });

    // ===== COLETAR DADOS DO FORM =====
    function collectFormData() {
      return {
        [COL.NOME]: document.getElementById('f-nome').value.trim(),
        [COL.EMAIL]: document.getElementById('f-email').value.trim(),
        [COL.MATRICULA]: document.getElementById('f-matricula').value.trim(),
        [COL.TELEFONE]: document.getElementById('f-telefone').value.trim(),
        [COL.ESCOLA]: document.getElementById('f-escola').value.trim(),
        [COL.PERIODO]: document.getElementById('f-periodo').value.trim(),
        [COL.ENTRADA]: document.getElementById('f-entrada').value.trim(),
        [COL.SAIDA_INTERVALO]: document.getElementById('f-saida-intervalo').value.trim(),
        [COL.ENTRADA_VOLTA]: document.getElementById('f-entrada-volta').value.trim(),
        [COL.SAIDA]: document.getElementById('f-saida').value.trim()
      };
    }

    // ===== VALIDAÇÕES =====
    function validateForm(data) {
      const required = [COL.NOME, COL.EMAIL, COL.MATRICULA, COL.TELEFONE, COL.ESCOLA, COL.PERIODO, COL.ENTRADA, COL.SAIDA_INTERVALO, COL.ENTRADA_VOLTA, COL.SAIDA];
      for (const field of required) {
        if (!data[field]) {
          Swal.fire('Campo obrigatório', 'Preencha o campo: ' + field, 'warning');
          return false;
        }
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(data[COL.EMAIL])) {
        Swal.fire('E-mail inválido', 'Digite um e-mail válido.', 'error');
        return false;
      }

      if (isSchoolEmail(data[COL.EMAIL])) {
        Swal.fire('E-mail inválido', 'Não é permitido e-mail institucional de escola.', 'error');
        return false;
      }

      // Verificar duplicidade (apenas em modo novo)
      if (currentMode === 'new') {
        const dup = findRecordByEmailOrMatricula(data[COL.EMAIL], data[COL.MATRICULA]);
        if (dup) {
          Swal.fire('Registro duplicado', 'Já existe um cadastro com este E-mail ou Matrícula.', 'error');
          return false;
        }
      }

      return true;
    }

    // ===== SALVAR (NOVO) =====
    async function appendRecord(data) {
      const values = [[
        data[COL.NOME], data[COL.EMAIL], data[COL.MATRICULA], data[COL.TELEFONE], data[COL.ESCOLA],
        data[COL.PERIODO], data[COL.ENTRADA], data[COL.SAIDA_INTERVALO], data[COL.ENTRADA_VOLTA], data[COL.SAIDA]
      ]];

      debugLog('appendRecord - valores', values);

      const resp = await gapi.client.sheets.spreadsheets.values.append({
        spreadsheetId: SPREADSHEET_ID_REGISTROS,
        range: 'A1',
        valueInputOption: 'RAW',
        insertDataOption: 'INSERT_ROWS',
        resource: { values: values }
      });

      debugLog('appendRecord - resposta', resp.result);
      return resp;
    }

    // ===== ATUALIZAR =====
    async function updateRecord(data) {
      const rowIndex = currentRecord.__rowIndex;
      const range = 'A' + rowIndex + ':J' + rowIndex;

      const values = [[
        data[COL.NOME], data[COL.EMAIL], data[COL.MATRICULA], data[COL.TELEFONE], data[COL.ESCOLA],
        data[COL.PERIODO], data[COL.ENTRADA], data[COL.SAIDA_INTERVALO], data[COL.ENTRADA_VOLTA], data[COL.SAIDA]
      ]];

      debugLog('updateRecord - range', range);
      debugLog('updateRecord - valores', values);

      const resp = await gapi.client.sheets.spreadsheets.values.update({
        spreadsheetId: SPREADSHEET_ID_REGISTROS,
        range: range,
        valueInputOption: 'RAW',
        resource: { values: values }
      });

      debugLog('updateRecord - resposta', resp.result);
      return resp;
    }

    // ===== SALVAR (BOTÃO) =====
    document.getElementById('btn-save').addEventListener('click', async () => {
      const data = collectFormData();
      debugLog('Dados coletados', data);

      if (!validateForm(data)) return;

      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      btn.textContent = 'Salvando...';

      try {
        if (currentMode === 'update' && currentRecord) {
          await updateRecord(data);
          await loadExistingRecords();
          debugLog('Atualização concluída');
          Swal.fire('Sucesso!', 'Cadastro atualizado com sucesso!', 'success')
            .then(() => location.reload());
        } else {
          await appendRecord(data);
          await loadExistingRecords();
          debugLog('Novo cadastro concluído');
          Swal.fire('Sucesso!', 'Cadastro realizado com sucesso!', 'success')
            .then(() => location.reload());
        }
      } catch (err) {
        debugLog('Erro ao salvar', err);
        Swal.fire('Erro', 'Falha ao salvar: ' + (err.result ? JSON.stringify(err.result) : err.message), 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar';
      }
    });

    // ===== INIT =====
    window.addEventListener('load', () => {
      debugLog('Inicializando CECAPE...');
      loadGoogleScripts();
    });
  </script>
</body>
</html>
