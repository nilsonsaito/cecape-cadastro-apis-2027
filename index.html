<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CECAPE - Cadastro</title>

  <!-- SweetAlert2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Google Identity Services / Client -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    :root {
      --color-primary: #1a73e8;
      --color-primary-dark: #1557b0;
      --color-success: #2e7d32;
      --color-error: #c62828;
      --color-warning: #f9a825;
      --color-info: #0277bd;
      --color-bg: #f4f6f8;
      --color-surface: #ffffff;
      --color-text: #202124;
      --color-muted: #5f6368;
      --color-border: #dadce0;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
    }

    header {
      background: var(--color-primary);
      color: #fff;
      padding: 18px 24px;
      box-shadow: var(--shadow);
    }

    header h1 { margin: 0; font-size: 1.4rem; }
    header p { margin: 4px 0 0; opacity: 0.9; font-size: 0.9rem; }

    main {
      max-width: 760px;
      margin: 24px auto;
      padding: 0 16px;
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      margin: 0 0 16px;
      font-size: 1.1rem;
      color: var(--color-primary-dark);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group { display: flex; flex-direction: column; }
    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 0.85rem;
      color: var(--color-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    input, select, textarea {
      padding: 10px 12px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 0.95rem;
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      font-weight: 600;
    }

    button:active { transform: translateY(1px); }

    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: var(--color-primary-dark); }

    .btn-secondary { background: #e8eaed; color: var(--color-text); }
    .btn-secondary:hover { background: #d2d5d9; }

    .btn-danger { background: var(--color-error); color: #fff; }
    .btn-danger:hover { background: #a91e1e; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .toggle-row input[type=checkbox] { width: 18px; height: 18px; }

    #statusArea { min-height: 20px; }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    /* SweetAlert2 custom theme */
    .swal2-popup {
      border-radius: 12px !important;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif !important;
    }
    .swal2-confirm {
      background: var(--color-primary) !important;
      border-radius: 8px !important;
      font-weight: 600 !important;
    }
    .swal2-cancel {
      background: #e8eaed !important;
      color: var(--color-text) !important;
      border-radius: 8px !important;
      font-weight: 600 !important;
    }
    .swal2-icon.swal2-error { border-color: var(--color-error) !important; color: var(--color-error) !important; }
    .swal2-icon.swal2-success { border-color: var(--color-success) !important; color: var(--color-success) !important; }
    .swal2-icon.swal2-warning { border-color: var(--color-warning) !important; color: var(--color-warning) !important; }
    .swal2-icon.swal2-info { border-color: var(--color-info) !important; color: var(--color-info) !important; }
  </style>
</head>
<body>
  <header>
    <h1>CECAPE - Cadastro de Participantes</h1>
    <p>Preencha os dados abaixo para registrar na planilha do Google.</p>
  </header>

  <main>
    <div class="card">
      <h2>Dados do Cadastro</h2>

      <div class="toggle-row">
        <input type="checkbox" id="manualMode" />
        <label for="manualMode" style="margin:0;">Modo manual (digitar escola em vez de selecionar)</label>
      </div>

      <form id="cadastroForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="nome">Nome completo *</label>
            <input type="text" id="nome" name="nome" required />
          </div>

          <div class="form-group">
            <label for="cpf">CPF *</label>
            <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required />
          </div>

          <div class="form-group">
            <label for="email">E-mail *</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" name="telefone" placeholder="(00) 00000-0000" />
          </div>

          <div class="form-group" id="escolaSelectGroup">
            <label for="escola">Escola *</label>
            <select id="escola" name="escola" required>
              <option value="">Carregando escolas...</option>
            </select>
          </div>

          <div class="form-group full" id="escolaManualGroup" style="display:none;">
            <label for="escolaManual">Escola (manual) *</label>
            <input type="text" id="escolaManual" name="escolaManual" />
          </div>

          <div class="form-group">
            <label for="turma">Turma</label>
            <input type="text" id="turma" name="turma" />
          </div>

          <div class="form-group">
            <label for="turno">Turno</label>
            <select id="turno" name="turno">
              <option value="">Selecione</option>
              <option value="Manhã">Manhã</option>
              <option value="Tarde">Tarde</option>
              <option value="Noite">Noite</option>
              <option value="Integral">Integral</option>
            </select>
          </div>

          <div class="form-group full">
            <label for="observacoes">Observações</label>
            <textarea id="observacoes" name="observacoes" rows="3"></textarea>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary">Salvar</button>
          <button type="button" class="btn-secondary" id="btnLimpar">Limpar</button>
          <button type="button" class="btn-danger" id="btnResetar">Resetar tudo</button>
        </div>
      </form>

      <div id="statusArea"></div>
    </div>
  </main>

  <script>
    // ===== Configurações do Google =====
    const GOOGLE_CONFIG = {
      clientId: 'SEU_CLIENT_ID.apps.googleusercontent.com',
      scriptUrl: 'https://script.google.com/macros/s/SUA_DEPLOYMENT_ID/exec',
      scope: 'https://www.googleapis.com/auth/spreadsheets'
    };

    // ===== Estado da aplicação =====
    let escolasCarregadas = [];
    let tokenGoogle = null;

    // ===== SweetAlert2 helpers =====
    const SwalTheme = {
      confirmButtonColor: '#1a73e8',
      cancelButtonColor: '#e8eaed',
      customClass: {
        confirmButton: 'swal2-confirm',
        cancelButton: 'swal2-cancel',
        popup: 'swal2-popup'
      },
      buttonsStyling: true
    };

    function showStatus(message, type = 'info', opts = {}) {
      const iconMap = { error: 'error', success: 'success', warning: 'warning', info: 'info' };
      const icon = iconMap[type] || 'info';
      const useToast = opts.toast !== false && type !== 'error';

      if (useToast) {
        return Swal.fire({
          ...SwalTheme,
          toast: true,
          position: 'top-end',
          icon: icon,
          title: message,
          showConfirmButton: false,
          timer: 3500,
          timerProgressBar: true,
          animation: true,
          didOpen: (toast) => {
            toast.addEventListener('mouseenter', Swal.stopTimer);
            toast.addEventListener('mouseleave', Swal.resumeTimer);
          }
        });
      }

      return Swal.fire({
        ...SwalTheme,
        icon: icon,
        title: opts.title || defaultTitle(type),
        text: message,
        confirmButtonText: opts.confirmText || 'OK',
        animation: true
      });
    }

    function defaultTitle(type) {
      switch (type) {
        case 'error': return 'Erro';
        case 'success': return 'Sucesso';
        case 'warning': return 'Atenção';
        default: return 'Informação';
      }
    }

    function showConfirm(title, text, opts = {}) {
      return Swal.fire({
        ...SwalTheme,
        icon: 'warning',
        title: title,
        text: text,
        showCancelButton: true,
        confirmButtonText: opts.confirmText || 'Confirmar',
        cancelButtonText: opts.cancelText || 'Cancelar',
        reverseButtons: true,
        animation: true
      }).then(result => result.isConfirmed);
    }

    function showError(message, opts = {}) {
      return Swal.fire({
        ...SwalTheme,
        icon: 'error',
        title: opts.title || 'Erro',
        text: message,
        confirmButtonText: opts.confirmText || 'OK',
        animation: true
      });
    }

    function showSuccess(message, opts = {}) {
      if (opts.modal) {
        return Swal.fire({
          ...SwalTheme,
          icon: 'success',
          title: opts.title || 'Sucesso',
          text: message,
          confirmButtonText: opts.confirmText || 'OK',
          animation: true
        });
      }
      return Swal.fire({
        ...SwalTheme,
        toast: true,
        position: 'top-end',
        icon: 'success',
        title: message,
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        animation: true
      });
    }

    function showWarning(message, opts = {}) {
      if (opts.modal) {
        return Swal.fire({
          ...SwalTheme,
          icon: 'warning',
          title: opts.title || 'Atenção',
          text: message,
          confirmButtonText: opts.confirmText || 'OK',
          animation: true
        });
      }
      return Swal.fire({
        ...SwalTheme,
        toast: true,
        position: 'top-end',
        icon: 'warning',
        title: message,
        showConfirmButton: false,
        timer: 3500,
        timerProgressBar: true,
        animation: true
      });
    }

    function showInfo(message, opts = {}) {
      if (opts.modal) {
        return Swal.fire({
          ...SwalTheme,
          icon: 'info',
          title: opts.title || 'Informação',
          text: message,
          confirmButtonText: opts.confirmText || 'OK',
          animation: true
        });
      }
      return Swal.fire({
        ...SwalTheme,
        toast: true,
        position: 'top-end',
        icon: 'info',
        title: message,
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        animation: true
      });
    }

    // ===== Validações =====
    function validarCPF(cpf) {
      cpf = cpf.replace(/[^\d]/g, '');
      if (cpf.length !== 11) return false;
      if (/^(\d)\1+$/.test(cpf)) return false;
      let soma = 0, resto;
      for (let i = 1; i <= 9; i++) soma += parseInt(cpf[i - 1]) * (11 - i);
      resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;
      if (resto !== parseInt(cpf[9])) return false;
      soma = 0;
      for (let i = 1; i <= 10; i++) soma += parseInt(cpf[i - 1]) * (12 - i);
      resto = (soma * 10) % 11;
      if (resto === 10) resto = 0;
      if (resto !== parseInt(cpf[10])) return false;
      return true;
    }

    function validarEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validarFormulario() {
      const nome = document.getElementById('nome').value.trim();
      const cpf = document.getElementById('cpf').value.trim();
      const email = document.getElementById('email').value.trim();
      const manual = document.getElementById('manualMode').checked;
      const escola = manual
        ? document.getElementById('escolaManual').value.trim()
        : document.getElementById('escola').value.trim();

      if (!nome) {
        showError('Informe o nome completo.');
        return false;
      }
      if (!validarCPF(cpf)) {
        showError('CPF inválido. Verifique o número informado.');
        return false;
      }
      if (!validarEmail(email)) {
        showError('E-mail inválido. Verifique o endereço informado.');
        return false;
      }
      if (!escola) {
        showError('Selecione ou informe a escola.');
        return false;
      }
      return true;
    }

    // ===== Carregamento de escolas =====
    async function carregarEscolas() {
      const select = document.getElementById('escola');
      try {
        showInfo('Carregando escolas...');
        const resp = await fetch(GOOGLE_CONFIG.scriptUrl + '?action=escolas');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        escolasCarregadas = Array.isArray(data) ? data : (data.escolas || []);
        select.innerHTML = '<option value="">Selecione a escola</option>';
        escolasCarregadas.forEach(e => {
          const opt = document.createElement('option');
          opt.value = typeof e === 'string' ? e : (e.nome || e.value);
          opt.textContent = opt.value;
          select.appendChild(opt);
        });
        showSuccess('Escolas carregadas com sucesso.');
      } catch (err) {
        console.error(err);
        select.innerHTML = '<option value="">Erro ao carregar</option>';
        showError('Não foi possível carregar a lista de escolas. Verifique sua conexão e tente novamente.');
      }
    }

    // ===== Modo manual =====
    function alternarModoManual() {
      const manual = document.getElementById('manualMode').checked;
      document.getElementById('escolaSelectGroup').style.display = manual ? 'none' : 'flex';
      document.getElementById('escolaManualGroup').style.display = manual ? 'flex' : 'none';
      if (manual) {
        showInfo('Modo manual ativado. Digite o nome da escola.');
      }
    }

    // ===== Google Identity =====
    function initGoogle() {
      if (typeof google === 'undefined' || !google.accounts || !google.accounts.id) {
        showWarning('Google Identity Services não disponível. Algumas funções podem não funcionar.', { modal: true });
        return;
      }
      google.accounts.id.initialize({
        client_id: GOOGLE_CONFIG.clientId,
        callback: handleCredential
      });
    }

    function handleCredential(response) {
      tokenGoogle = response.credential || null;
      showSuccess('Autenticado com Google.');
    }

    // ===== Salvamento na planilha =====
    async function salvarNaPlanilha(dados) {
      const payload = {
        action: 'salvar',
        dados: dados
      };
      const resp = await fetch(GOOGLE_CONFIG.scriptUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return await resp.json();
    }

    function coletarDados() {
      const manual = document.getElementById('manualMode').checked;
      return {
        nome: document.getElementById('nome').value.trim(),
        cpf: document.getElementById('cpf').value.trim(),
        email: document.getElementById('email').value.trim(),
        telefone: document.getElementById('telefone').value.trim(),
        escola: manual
          ? document.getElementById('escolaManual').value.trim()
          : document.getElementById('escola').value.trim(),
        turma: document.getElementById('turma').value.trim(),
        turno: document.getElementById('turno').value.trim(),
        observacoes: document.getElementById('observacoes').value.trim(),
        token: tokenGoogle
      };
    }

    function limparFormulario() {
      document.getElementById('cadastroForm').reset();
    }

    // ===== Eventos =====
    document.addEventListener('DOMContentLoaded', () => {
      initGoogle();
      carregarEscolas();

      document.getElementById('manualMode').addEventListener('change', alternarModoManual);

      document.getElementById('btnLimpar').addEventListener('click', async () => {
        const ok = await showConfirm(
          'Limpar formulário?',
          'Os dados preenchidos serão removidos.'
        );
        if (ok) {
          limparFormulario();
          showSuccess('Formulário limpo.');
        }
      });

      document.getElementById('btnResetar').addEventListener('click', async () => {
        const ok = await showConfirm(
          'Resetar tudo?',
          'Isto irá limpar o formulário e recarregar as escolas. Deseja continuar?',
          { confirmText: 'Resetar', cancelText: 'Cancelar' }
        );
        if (ok) {
          limparFormulario();
          document.getElementById('manualMode').checked = false;
          alternarModoManual();
          await carregarEscolas();
          showSuccess('Tudo resetado com sucesso.');
        }
      });

      document.getElementById('cadastroForm').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        if (!validarFormulario()) return;

        const ok = await showConfirm(
          'Confirmar envio?',
          'Os dados serão salvos na planilha do Google.',
          { confirmText: 'Salvar', cancelText: 'Cancelar' }
        );
        if (!ok) return;

        const dados = coletarDados();
        try {
          showInfo('Enviando dados...');
          const resultado = await salvarNaPlanilha(dados);
          if (resultado && resultado.erro) {
            showError(resultado.mensagem || 'Erro ao salvar na planilha.');
            return;
          }
          showSuccess('Cadastro salvo com sucesso na planilha!', { modal: true });
          limparFormulario();
        } catch (err) {
          console.error(err);
          showError('Falha ao salvar. Verifique sua conexão e tente novamente.');
        }
      });
    });
  </script>
</body>
</html>
